# internship-ops scanner configuration
# Keeps the same scanner behavior as interm-ops, but tuned for paid tech internships.

scan_history:
  recheck_after_days: 21

title_filter:
  positive:
    - "Intern"
    - "Internship"
    - "Software Engineering Intern"
    - "Software Engineer Intern"
    - "Engineering Intern"
    - "Developer Intern"
    - "Backend Intern"
    - "Frontend Intern"
    - "Full Stack Intern"
    - "AI Intern"
    - "ML Intern"
    - "Machine Learning Intern"
    - "Data Science Intern"
    - "Data Intern"
    - "Research Intern"
    - "Cloud Intern"
    - "DevOps Intern"
    - "Security Intern"
    - "Product Intern"
    - "Working Student"
    - "Co-op"
    - "Summer Intern"
  negative:
    - "Senior"
    - "Staff"
    - "Lead"
    - "Principal"
    - "Manager"
    - "Director"
    - "VP"
    - "Sales"
    - "Marketing"
    - "Business Development"
    - "Recruiter"
    - "HR"
    - "Human Resources"
    - "Finance"
    - "Accounting"
    - "Legal"
    - "Operations"
    - "Customer Support"
    - "Customer Success"
    - "Talent"
    - "Campus Ambassador"
    - "Volunteer"
    - "Unpaid"
    - "Graphic Design"
    - "Content Writer"

job_boards:
  - name: RemoteOK
    provider: remoteok
    careers_url: https://remoteok.com/api
    enabled: true
    notes: "Global remote board. Scanner filters titles down to internship-like roles."

  - name: Remotive
    provider: remotive
    careers_url: https://remotive.com/api/remote-jobs
    enabled: true
    notes: "Remote jobs feed. Good for global startups and async-friendly teams."

  - name: Working Nomads
    provider: workingnomads
    careers_url: https://www.workingnomads.com/api/exposed_jobs/
    enabled: true
    notes: "Remote board. Useful for globally distributed engineering teams."

tracked_companies:
